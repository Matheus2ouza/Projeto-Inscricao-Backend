# Configuração do banco de dados usado para testes e desenvolvimento

services:
  db:
    image: postgres:15
    container_name: db_inscricao
    restart: always
    env_file:
      - .env.dev
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - inscricao_net

  redis:
    image: redis:7-alpine
    container_name: redis_inscricao
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - 'redis_data:/data'
    networks:
      - inscricao_net

volumes:
  db_data:
  redis_data:

networks:
  inscricao_net:
    external: true

# Configuração do banco de dados usado para testes e desenvolvimento

version: '3.9'

services:
  db:
    image: postgres:15
    container_name: db_inscricao
    restart: always
    env_file:
      - .env.dev
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - inscricao_net

volumes:
  db_data:

networks:
  inscricao_net:
    external: true

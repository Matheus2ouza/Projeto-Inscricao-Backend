services:
  backend1:
    image: backend-sistema-inscricao:1.5
    container_name: backend1
    build: .
    env_file:
      - .env.dev
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    ports:
      - '3000:3000'
    environment:
      - CONTAINER_NAME=backend1
    mem_limit: 512m
    cpus: 0.1
    networks:
      - inscricao_net

  backend2:
    image: backend-sistema-inscricao:1.5
    container_name: backend2
    build: .
    env_file:
      - .env.dev
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    ports:
      - '3001:3000'
    environment:
      - CONTAINER_NAME=backend2
    mem_limit: 512m
    cpus: 0.1
    networks:
      - inscricao_net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - inscricao_net

networks:
  inscricao_net:
    external: true

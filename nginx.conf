events {}

http {
  upstream backend_servers {
    server backend1:3000;
    server backend2:3000;
  }

  client_max_body_size 5M;


  server {
    listen 80;

    location / {
      proxy_pass http://backend_servers;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 5M;
    }
  }
}
